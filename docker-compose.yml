services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: power_tracker
      POSTGRES_USER: pt_admin
      POSTGRES_PASSWORD: admin123
    volumes:
      - postgres_data_powertracker:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

volumes:
  postgres_data_powertracker:
  rabbitmq_data:
